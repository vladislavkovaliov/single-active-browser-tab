<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broadcast Strategy Test</title>
</head>
<body>
    <h1>Broadcast Strategy Test</h1>
    <div id="status">Initializing...</div>
    <button id="takeover">Take Over</button>
    <button id="stop">Stop</button>
    <button id="start">Start</button>
    
    <script type="module">
        import { SingleTabManager } from './src/src/core/index.ts';
        
        const statusDiv = document.getElementById('status');
        const takeoverBtn = document.getElementById('takeover');
        const stopBtn = document.getElementById('stop');
        const startBtn = document.getElementById('start');
        
        // Test broadcast strategy
        const manager = new SingleTabManager('broadcast', {
            onActive: () => {
                statusDiv.textContent = 'Status: ACTIVE (using broadcast)';
                statusDiv.style.color = 'green';
                console.log('Tab became ACTIVE');
            },
            onBlocked: () => {
                statusDiv.textContent = 'Status: BLOCKED (using broadcast)';
                statusDiv.style.color = 'red';
                console.log('Tab became BLOCKED');
            },
            heartbeatInterval: 1000
        });
        
        takeoverBtn.addEventListener('click', () => {
            manager.takeover();
        });
        
        stopBtn.addEventListener('click', () => {
            manager.stop();
            statusDiv.textContent = 'Status: STOPPED';
            statusDiv.style.color = 'gray';
        });
        
        startBtn.addEventListener('click', () => {
            manager.start();
        });
        
        // Start the manager
        manager.start();
        
        // Log current status every 2 seconds
        setInterval(() => {
            console.log('Current active status:', manager.isActive());
        }, 2000);
    </script>
</body>
</html>
